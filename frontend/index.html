<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/favicon.ico" rel="icon">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="#ffffff" name="theme-color">
    <meta content="yes" name="mobile-web-app-capable">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <link href="/logo.svg" rel="apple-touch-icon">
    <title>Forkiva – Restaurant POS</title>
    <link href="/loader.css" rel="stylesheet" type="text/css"/>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const imgLogo = document.querySelector('.loading-logo img');
            const logo = localStorage.getItem('logo_url');

            if (logo) {
                imgLogo.src = logo;
            }
        });
    </script>
</head>
<body>
<div id="app">
    <div id="loading-bg">
        <div class="loading-logo">
            <img alt="logo" height="80px" src="/logo.svg" width="80px"/>
        </div>
        <div class="loading">
            <div class="effect-1 effects"></div>
            <div class="effect-2 effects"></div>
            <div class="effect-3 effects"></div>
        </div>
    </div>
</div>
<script src="/src/main.ts" type="module"></script>
</body>
</html>
